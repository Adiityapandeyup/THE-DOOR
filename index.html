<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAGAIRA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        /* Custom Animations & Glassmorphism */
        body {
            background: linear-gradient(-45deg, #0ea5e9, #38bdf8, #f59e0b, #fbbf24);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
        }

        .tab-content { display: none; animation: slideUp 0.4s ease-out; }
        .tab-content.active { display: block; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .nav-btn.active { color: #fbbf24; border-bottom: 3px solid #fbbf24; }
    </style>
</head>
<body class="text-white font-sans min-h-screen pb-24 md:pb-0 md:pt-24">

    <nav class="hidden md:flex fixed top-0 w-full bg-black/30 backdrop-blur-md p-4 justify-between items-center z-50 shadow-2xl">
        <h1 class="text-2xl font-black tracking-tighter text-orange-400">VAGAIRA <span class="text-white font-light">PRO</span></h1>
        <div class="flex space-x-8 font-medium">
            <button onclick="showTab('pdf')" class="hover:text-orange-400 transition nav-btn active" id="d-pdf">PDF</button>
            <button onclick="showTab('weather')" class="hover:text-orange-400 transition nav-btn" id="d-weather">Weather</button>
            <button onclick="showTab('qr')" class="hover:text-orange-400 transition nav-btn" id="d-qr">QR Scanner</button>
            <button onclick="showTab('ip')" class="hover:text-orange-400 transition nav-btn" id="d-ip">My IP</button>
        </div>
    </nav>

    <main class="container mx-auto p-4 max-w-2xl">
        
        <section id="pdf" class="tab-content active">
            <div class="glass-card p-8 shadow-2xl">
                <h2 class="text-3xl font-bold mb-6 flex items-center gap-2">🖼️ <span class="text-orange-400">Image</span> to PDF</h2>
                <input type="file" id="imageInput" accept="image/*" class="block w-full text-sm text-gray-200 file:mr-4 file:py-3 file:px-6 file:rounded-full file:border-0 file:text-sm file:font-bold file:bg-orange-500 file:text-white hover:file:bg-orange-600 transition-all cursor-pointer mb-6"/>
                <button onclick="convertToPDF()" class="w-full bg-gradient-to-r from-orange-500 to-orange-600 py-4 rounded-xl font-bold text-lg hover:scale-[1.02] active:scale-95 transition-all shadow-lg">Convert & Download</button>
            </div>
        </section>

        <section id="weather" class="tab-content">
            <div class="glass-card p-8 shadow-2xl">
                <h2 class="text-3xl font-bold mb-6">🌦️ Weather <span class="text-orange-400">Update</span></h2>
                <div class="flex gap-2 mb-8">
                    <input type="text" id="cityInput" placeholder="Enter city name..." class="flex-1 bg-white/10 border border-white/20 rounded-xl p-4 text-white placeholder-gray-300 focus:ring-2 focus:ring-orange-400 outline-none">
                    <button onclick="getWeatherByCity()" class="bg-orange-500 px-6 rounded-xl font-bold hover:bg-orange-600 transition">Search</button>
                </div>
                <div id="weatherDisplay" class="text-center py-4">
                    <div class="animate-pulse">Locating...</div>
                </div>
                <div id="forecastDisplay" class="grid grid-cols-2 gap-3 mt-6"></div>
            </div>
        </section>

        <section id="qr" class="tab-content">
            <div class="glass-card p-8 shadow-2xl">
                <h2 class="text-3xl font-bold mb-6">🔍 Smart <span class="text-orange-400">Scanner</span></h2>
                <div id="reader" class="w-full rounded-2xl overflow-hidden border-2 border-orange-400/30"></div>
                <div id="qr-result" class="mt-6 p-4 bg-black/20 rounded-xl text-center break-all font-mono text-orange-300">Result will appear here...</div>
            </div>
        </section>

        <section id="ip" class="tab-content">
            <div class="glass-card p-8 shadow-2xl text-center">
                <h2 class="text-3xl font-bold mb-6">🌐 My <span class="text-orange-400">Network</span> IP</h2>
                <div id="ip-info" class="space-y-4">
                    <p class="text-gray-200">Checking your digital footprint...</p>
                </div>
                <button onclick="checkIP()" class="mt-8 bg-white/10 hover:bg-white/20 px-6 py-2 rounded-full text-sm transition border border-white/20">Refresh Connection</button>
            </div>
        </section>

    </main>

    <nav class="md:hidden fixed bottom-0 w-full bg-black/40 backdrop-blur-xl flex justify-around p-4 border-t border-white/10 z-50">
        <button onclick="showTab('pdf')" class="flex flex-col items-center gap-1 group">
            <span class="text-2xl group-hover:scale-110 transition">📄</span><span class="text-[10px] uppercase tracking-widest">PDF</span>
        </button>
        <button onclick="showTab('weather')" class="flex flex-col items-center gap-1 group">
            <span class="text-2xl group-hover:scale-110 transition">☀️</span><span class="text-[10px] uppercase tracking-widest">Sky</span>
        </button>
        <button onclick="showTab('qr')" class="flex flex-col items-center gap-1 group">
            <span class="text-2xl group-hover:scale-110 transition">📷</span><span class="text-[10px] uppercase tracking-widest">Scan</span>
        </button>
        <button onclick="showTab('ip')" class="flex flex-col items-center gap-1 group">
            <span class="text-2xl group-hover:scale-110 transition">📡</span><span class="text-[10px] uppercase tracking-widest">IP</span>
        </button>
    </nav>

    <script>
        // --- Tab Management ---
        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            if(document.getElementById('d-'+tabId)) document.getElementById('d-'+tabId).classList.add('active');

            if(tabId !== 'qr' && window.html5QrCode) {
                window.html5QrCode.stop().catch(() => {});
            } else if (tabId === 'qr') {
                startScanner();
            } else if (tabId === 'ip') {
                checkIP();
            }
        }

        // --- IP Checker Logic ---
        async function checkIP() {
            const display = document.getElementById('ip-info');
            display.innerHTML = '<div class="animate-spin text-4xl mb-4">🌀</div><p>Fetching Network Data...</p>';
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                display.innerHTML = `
                    <div class="text-4xl font-black text-orange-400 mb-2">${data.ip}</div>
                    <div class="text-xl font-semibold">${data.city}, ${data.country_name}</div>
                    <div class="mt-4 grid grid-cols-2 gap-4 text-sm text-gray-300">
                        <div class="bg-black/20 p-3 rounded-lg"><strong>ISP:</strong><br>${data.org}</div>
                        <div class="bg-black/20 p-3 rounded-lg"><strong>Lat/Long:</strong><br>${data.latitude}, ${data.longitude}</div>
                    </div>
                `;
            } catch (e) {
                display.innerHTML = "Error fetching IP. Please check connection.";
            }
        }

        // --- PDF Logic ---
        async function convertToPDF() {
            const { jsPDF } = window.jspdf;
            const input = document.getElementById('imageInput');
            if (input.files.length === 0) return alert("Please pick an image!");

            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const doc = new jsPDF();
                    const width = doc.internal.pageSize.getWidth();
                    doc.addImage(img, 'JPEG', 10, 10, width - 20, 150);
                    doc.save("Vagaira_File.pdf");
                };
            };
            reader.readAsDataURL(input.files[0]);
        }

        // --- Weather Logic ---
        const API_KEY = '6c6b9b579178c338415451671e9ff00b'; 

        async function fetchWeather(lat, lon, city = null) {
            const url = city 
                ? `https://api.openweathermap.org/data/2.5/forecast?q=${city}&units=metric&appid=${API_KEY}`
                : `https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&units=metric&appid=${API_KEY}`;
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                displayWeather(data);
            } catch (err) {
                document.getElementById('weatherDisplay').innerHTML = "City not found.";
            }
        }

        function displayWeather(data) {
            const current = data.list[0];
            document.getElementById('weatherDisplay').innerHTML = `
                <h3 class="text-4xl font-black">${data.city.name}</h3>
                <p class="text-6xl my-4 font-bold text-orange-400">${Math.round(current.main.temp)}°C</p>
                <p class="capitalize text-lg opacity-80">${current.weather[0].description}</p>
            `;
            
            let forecastHTML = '';
            for(let i = 8; i < 24; i+=8) {
                const day = data.list[i];
                forecastHTML += `
                    <div class="bg-white/10 p-4 rounded-2xl border border-white/5">
                        <p class="text-xs opacity-60">${day.dt_txt.split(' ')[0]}</p>
                        <p class="text-xl font-bold text-orange-300">${Math.round(day.main.temp)}°C</p>
                    </div>
                `;
            }
            document.getElementById('forecastDisplay').innerHTML = forecastHTML;
        }

        function getWeatherByCity() {
            const city = document.getElementById('cityInput').value;
            if(city) fetchWeather(null, null, city);
        }

        navigator.geolocation.getCurrentPosition(pos => {
            fetchWeather(pos.coords.latitude, pos.coords.longitude);
        }, () => {
            document.getElementById('weatherDisplay').innerHTML = "Enter a city to see weather";
        });

        // --- Scanner Logic ---
        function startScanner() {
            if(!window.html5QrCode) window.html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start(
                { facingMode: "environment" }, 
                { fps: 15, qrbox: 250 },
                (text) => {
                    document.getElementById('qr-result').innerHTML = `Link: <a href="${text}" target="_blank" class="text-orange-400 underline">${text}</a>`;
                }
            ).catch(() => {});
        }

        // Notification Permission
        if ("Notification" in window) Notification.requestPermission();
    </script>
</body>
</html>
